name: environment variables ci

on:
  workflow_dispatch:
  push:
    branches:
      - master
env:
  COURSE_NAME: "Github Actions Devops Untericht"
  ENVIRONMENT_NAME: "Schulungsumebung bzw. Github"
jobs:
  env-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4
      - name: Informationen vor dem start 
        run: echo "Die pipeline wird ausgeführt von $GITHUB_ACTOR und du befindest dich im Branch $GITHUB_REF_NAME die id für den CI lauf ist $GITHUB_JOB"
      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh

      - name: Umgebungsvariable  test 
        run: echo "Kursname ist $COURSE_NAME und die Umngebung ist $ENVIRONMENT_NAME"

      - name: Umgebungsvariablen skript ausführen
        run: bash scripts/01_env_demo.sh
        env: 
          STEP_MESSAGE: "Diese variable ist nur hier gesetzt "
      - name: Report hochladen
        uses: actions/upload-artifact@v4
        with:
          name: environment-report
          path: output/env-report.txt          

